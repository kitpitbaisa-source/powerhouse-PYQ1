    <rect x="404" y="474" width="60" height="196" rx="14" fill="url(#col)"/>
    <rect x="410" y="480" width="10" height="184" rx="5" fill="#ffffff" opacity="0.75"/>
    <rect x="448" y="480" width="12" height="184" rx="6" fill="#98a8cf" opacity="0.55"/>

    <rect x="492" y="474" width="60" height="196" rx="14" fill="url(#col)"/>
    <rect x="498" y="480" width="10" height="184" rx="5" fill="#ffffff" opacity="0.75"/>
    <rect x="536" y="480" width="12" height="184" rx="6" fill="#98a8cf" opacity="0.55"/>

