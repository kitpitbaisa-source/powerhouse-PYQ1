<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="col" x1="0" y1="460" x2="0" y2="680" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#cfd8ee"/>
    </linearGradient>
    <linearGradient id="beam" x1="0" y1="440" x2="0" y2="475" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#d6def1"/>
    </linearGradient>
    <linearGradient id="ped" x1="512" y1="280" x2="512" y2="446" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#c6d1ec"/>
    </linearGradient>
    <linearGradient id="plinth" x1="0" y1="702" x2="0" y2="748" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#c2cde9"/>
    </linearGradient>
    <linearGradient id="gold" x1="470" y1="500" x2="560" y2="672" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff3c4"/>
      <stop offset="0.5" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- ground drop shadow -->
  <ellipse cx="512" cy="770" rx="252" ry="34" fill="#0a1547" opacity="0.28"/>

