    <rect x="316" y="474" width="60" height="196" rx="14" transform="translate(12,14)"/>
    <rect x="404" y="474" width="60" height="196" rx="14" transform="translate(12,14)"/>
    <rect x="492" y="474" width="60" height="196" rx="14" transform="translate(12,14)"/>
    <rect x="580" y="474" width="60" height="196" rx="14" transform="translate(12,14)"/>
    <rect x="668" y="474" width="60" height="196" rx="14" transform="translate(12,14)"/>
    <rect x="296" y="668" width="452" height="26" rx="10" transform="translate(12,14)"/>
    <rect x="268" y="704" width="500" height="44" rx="18" transform="translate(12,14)"/>
  </g>

